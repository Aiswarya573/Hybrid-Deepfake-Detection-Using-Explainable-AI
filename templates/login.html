<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DeepShield XAI</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Custom styling -->
    <link href="/static/style.css" rel="stylesheet">
</head>
<body class="bg-light-layout d-flex align-items-center justify-content-center min-vh-100 py-5">
    <div class="container container-login">
        <div class="text-center mb-4">
            <a href="/" class="navbar-brand d-inline-flex align-items-center font-display fw-bold text-mint-dark fs-3 mb-2">
                <i class="bi bi-shield-fill-check me-2 text-mint fs-2"></i>
                DEEPSHIELD
            </a>
            <p class="text-muted font-sans small text-uppercase tracking-wider">Sign in to your detection dashboard</p>
        </div>

        <div class="card p-4 shadow-sm border-0 bg-white">
            <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label font-sans text-xs fw-semibold text-muted text-uppercase tracking-wider">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="admin@deepshield.com">
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label for="password" class="form-label font-sans text-xs fw-semibold text-muted text-uppercase tracking-wider">Password</label>
                    </div>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="••••••">
                </div>
                <button type="submit" class="btn btn-mint w-100 py-2.5 fw-semibold d-flex align-items-center justify-content-center" id="submitBtn">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Sign In
                </button>
            </form>
        </div>

        <div class="text-center mt-4">
            <p class="text-muted font-sans small mb-0">No account? <a href="/register" class="text-mint font-medium">Create one &rarr;</a></p>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const alertBox = document.getElementById('loginAlert');
            const submitBtn = document.getElementById('submitBtn');
            const emailValue = document.getElementById('email').value.trim();
            const passwordValue = document.getElementById('password').value;

            alertBox.classList.add('d-none');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Authenticating...';

            try {
                const formData = new URLSearchParams();
                formData.append('email', emailValue);
                formData.append('password', passwordValue);

                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: formData
                });

                const result = await response.json();
                if (result.success) {
                    window.location.href = result.redirect || '/dashboard';
                } else {
                    alertBox.textContent = result.message || 'Invalid credentials. Please try again.';
                    alertBox.classList.remove('d-none');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i> Sign In';
                }
            } catch (err) {
                console.error(err);
                alertBox.textContent = 'Server communication error. Please try again later.';
                alertBox.classList.remove('d-none');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i> Sign In';
            }
        });
    </script>
</body>
</html>
